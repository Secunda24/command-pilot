<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#060810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CommandPilot Remote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#060810;
      --surface:#0c0f1a;
      --border:#161c2e;
      --cyan:#00e5ff;
      --green:#00d97e;
      --amber:#ffb700;
      --red:#ff4455;
      --muted:#2d3a52;
      --text:#d4daf0;
      --subtext:#6b7a9a;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
    body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

    #header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px 12px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
      gap:12px;
    }
    #logo{
      font-family:'Orbitron',monospace;
      font-size:18px;
      font-weight:900;
      color:var(--cyan);
      letter-spacing:3px;
    }
    #header-right{
      display:flex;
      align-items:center;
      gap:10px;
    }
    #voice-btn{
      border:1px solid var(--border);
      border-radius:999px;
      background:var(--surface);
      color:var(--subtext);
      font-size:11px;
      letter-spacing:1px;
      padding:6px 10px;
      cursor:pointer;
    }
    #voice-btn.on{
      color:var(--green);
      border-color:#00d97e40;
      background:#00d97e1a;
    }
    #pc-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--subtext);}
    #status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background 0.4s;}
    #status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green);}
    #status-dot.thinking{background:var(--amber);animation:pulse 0.8s infinite;}
    #status-dot.listening{background:var(--red);animation:pulse 0.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

    #ring-wrap{display:flex;justify-content:center;padding:12px 0 4px;flex-shrink:0;}
    #ring{display:block;}

    #status-label{
      text-align:center;
      font-family:'Orbitron',monospace;
      font-size:11px;
      letter-spacing:3px;
      color:var(--cyan);
      margin-bottom:6px;
      height:16px;
      transition:color 0.3s;
    }

    #connect-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding:20px;
      margin:10px 16px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
    }
    #connect-panel h2{
      font-family:'Orbitron',monospace;
      font-size:13px;
      color:var(--cyan);
      letter-spacing:2px;
    }
    #connect-panel p{
      font-size:12px;
      color:var(--subtext);
      text-align:center;
      line-height:1.6;
    }
    #token-input{
      width:100%;
      padding:12px 14px;
      background:var(--bg);
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      font-size:14px;
      outline:none;
      letter-spacing:2px;
      text-align:center;
    }
    #connect-btn{
      width:100%;
      padding:14px;
      background:var(--cyan);
      border:none;
      border-radius:10px;
      color:#060810;
      font-weight:700;
      font-size:15px;
      font-family:'Orbitron',monospace;
      letter-spacing:2px;
      cursor:pointer;
    }

    #msgs{
      flex:1;
      overflow-y:auto;
      padding:10px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      -webkit-overflow-scrolling:touch;
    }
    .msg{display:flex;flex-direction:column;max-width:84%;}
    .msg.user{align-self:flex-end;align-items:flex-end;}
    .msg.jarvis{align-self:flex-start;align-items:flex-start;}
    .msg-tag{
      font-size:9px;
      letter-spacing:2px;
      text-transform:uppercase;
      font-family:'Orbitron',monospace;
      margin-bottom:4px;
    }
    .msg.user .msg-tag{color:var(--cyan);}
    .msg.jarvis .msg-tag{color:var(--green);}
    .msg-tag.error{color:var(--red);}
    .msg-bubble{
      padding:11px 15px;
      border-radius:16px;
      font-size:14px;
      line-height:1.6;
      word-break:break-word;
    }
    .msg.user .msg-bubble{background:#00e5ff14;border:1px solid #00e5ff25;border-radius:16px 16px 5px 16px;}
    .msg.jarvis .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:5px 16px 16px 16px;}
    .msg.jarvis.error .msg-bubble{background:#1a060a;border-color:#ff445530;color:var(--red);}

    #quick-wrap{padding:4px 16px 8px;flex-shrink:0;}
    #quick-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
    #quick-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
    #quick-scroll::-webkit-scrollbar{display:none;}
    .qbtn{
      flex-shrink:0;
      padding:7px 13px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      font-size:12px;
      color:var(--subtext);
      cursor:pointer;
      white-space:nowrap;
      transition:all 0.15s;
    }
    .qbtn:active{background:#00e5ff14;border-color:#00e5ff30;color:var(--cyan);}

    #input-bar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      padding-bottom:max(12px, env(safe-area-inset-bottom));
      border-top:1px solid var(--border);
      flex-shrink:0;
      background:var(--bg);
    }
    #cmd-input{
      flex:1;
      padding:12px 16px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      color:var(--text);
      font-size:15px;
      outline:none;
      transition:border-color 0.2s;
    }
    #cmd-input:focus{border-color:#00e5ff40;}
    #send-btn,#mic-btn{
      width:46px;
      height:46px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:all 0.15s;
    }
    #send-btn{background:var(--cyan);}
    #send-btn:active{transform:scale(0.92);}
    #mic-btn{background:var(--surface);border:1px solid var(--border);}
    #mic-btn.recording{background:#ff445520;border-color:var(--red);}
    #mic-btn:disabled{opacity:0.5;cursor:not-allowed;}
    #mic-btn:active{transform:scale(0.92);}

    #offline-bar{
      display:none;
      text-align:center;
      padding:8px;
      background:#1a060a;
      font-size:11px;
      color:var(--red);
      letter-spacing:1px;
      flex-shrink:0;
    }
    #offline-bar.show{display:block;}

    #msgs::-webkit-scrollbar{width:3px;}
    #msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
  <div id="header">
    <div id="logo">ECHO</div>
    <div id="header-right">
      <button id="voice-btn" type="button" title="Toggle spoken replies">VOICE</button>
      <div id="pc-status">
        <div id="status-dot"></div>
        <span id="pc-label">PC Offline</span>
      </div>
    </div>
  </div>

  <div id="offline-bar" class="show">Not connected to relay server</div>

  <div id="ring-wrap">
    <canvas id="ring" width="180" height="180"></canvas>
  </div>
  <div id="status-label">DISCONNECTED</div>

  <div id="connect-panel">
    <h2>CONNECT</h2>
    <p>Enter your access token to link this phone to your CommandPilot PC.</p>
    <input id="token-input" type="password" placeholder="........" autocomplete="off" spellcheck="false" />
    <button id="connect-btn" type="button">CONNECT</button>
  </div>

  <div id="msgs" style="display:none"></div>

  <div id="quick-wrap" style="display:none">
    <div id="quick-label">Quick Commands</div>
    <div id="quick-scroll"></div>
  </div>

  <div id="input-bar" style="display:none">
    <button id="mic-btn" type="button" title="Voice input">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7a9a" stroke-width="2" stroke-linecap="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>
    <input id="cmd-input" type="text" placeholder="Command your PC..." autocomplete="off" spellcheck="false" />
    <button id="send-btn" type="button" title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#060810" stroke-width="2.5" stroke-linecap="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const TOKEN_KEY = "cp_token";
    const VOICE_ENABLED_KEY = "cp_voice_enabled";
    const DEFAULT_SERVER_URL = window.location.origin.startsWith("http")
      ? window.location.origin.replace(/^http/i, "ws")
      : "wss://commandpilot-remote.onrender.com";
    const SERVER_URL = DEFAULT_SERVER_URL;

    const QUICK_CMDS = [
      "Open YouTube",
      "Open Chrome",
      "Search Chrome for CommandPilot roadmap",
      "Open Gmail",
      "Show me the contents of the Echo Test Folder",
      "Open PromptPilot Studio",
      "What can you do?",
      "Tell me a joke"
    ];

    const STATUS_COLORS = {
      STANDBY: "#00e5ff",
      LISTENING: "#ff4455",
      SPEAKING: "#00d97e",
      THINKING: "#ffb700",
      DISCONNECTED: "#2d3a52"
    };

    let ws = null;
    let pcOnline = false;
    let jarvisStatus = "DISCONNECTED";
    let listening = false;
    let recognition = null;
    let mobileVoice = null;
    let voiceEnabled = localStorage.getItem(VOICE_ENABLED_KEY) !== "0";

    const connectPanel = document.getElementById("connect-panel");
    const offlineBar = document.getElementById("offline-bar");
    const msgsEl = document.getElementById("msgs");
    const quickWrap = document.getElementById("quick-wrap");
    const inputBar = document.getElementById("input-bar");
    const tokenInput = document.getElementById("token-input");
    const voiceBtn = document.getElementById("voice-btn");
    const micBtn = document.getElementById("mic-btn");
    const cmdInput = document.getElementById("cmd-input");

    function setStatus(status) {
      jarvisStatus = status;
      const col = STATUS_COLORS[status] || STATUS_COLORS.DISCONNECTED;
      document.getElementById("status-label").textContent = status;
      document.getElementById("status-label").style.color = col;

      const dot = document.getElementById("status-dot");
      dot.className =
        status === "STANDBY" || status === "SPEAKING"
          ? "online"
          : status === "THINKING"
            ? "thinking"
            : status === "LISTENING"
              ? "listening"
              : "";
    }

    function setPCOnline(online) {
      pcOnline = online;
      document.getElementById("pc-label").textContent = online ? "PC Online" : "PC Offline";
      if (!online) {
        setStatus("DISCONNECTED");
      } else if (!listening && jarvisStatus !== "THINKING" && jarvisStatus !== "SPEAKING") {
        setStatus("STANDBY");
      }
    }

    function addMessage(role, text, intent) {
      const value = (text || "").trim();
      if (!value) return;

      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "jarvis") + (intent === "error" ? " error" : "");

      const tag = document.createElement("div");
      tag.className = "msg-tag" + (intent === "error" ? " error" : "");
      tag.textContent = role === "user" ? "YOU" : (intent ? intent.toUpperCase() : "ECHO");

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = value;

      div.appendChild(tag);
      div.appendChild(bubble);
      msgsEl.appendChild(div);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function buildQuickCmds() {
      const scroll = document.getElementById("quick-scroll");
      scroll.innerHTML = "";
      QUICK_CMDS.forEach((cmd) => {
        const btn = document.createElement("button");
        btn.className = "qbtn";
        btn.textContent = cmd;
        btn.onclick = () => sendCommand(cmd);
        scroll.appendChild(btn);
      });
    }

    function setVoiceEnabled(enabled) {
      voiceEnabled = enabled;
      localStorage.setItem(VOICE_ENABLED_KEY, enabled ? "1" : "0");
      voiceBtn.classList.toggle("on", enabled);
      voiceBtn.textContent = enabled ? "VOICE ON" : "VOICE OFF";

      if (!enabled && "speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function selectPreferredVoice() {
      if (!("speechSynthesis" in window)) return;
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return;

      const englishVoices = voices.filter((v) => /^en[-_]/i.test(v.lang));
      mobileVoice =
        englishVoices.find((v) => /female/i.test(v.name)) ||
        englishVoices.find((v) => /google|samantha|zira|natural/i.test(v.name)) ||
        englishVoices[0] ||
        voices[0] ||
        null;
    }

    function speakReply(text) {
      const value = (text || "").trim();
      if (!voiceEnabled || !value || !("speechSynthesis" in window)) return;

      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(value);
        if (mobileVoice) {
          utterance.voice = mobileVoice;
          utterance.lang = mobileVoice.lang;
        } else {
          utterance.lang = "en-US";
        }

        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        utterance.onstart = () => {
          if (!listening) setStatus("SPEAKING");
        };

        utterance.onend = () => {
          if (!listening) setStatus(pcOnline ? "STANDBY" : "DISCONNECTED");
        };

        utterance.onerror = () => {
          if (!listening) setStatus(pcOnline ? "STANDBY" : "DISCONNECTED");
        };

        window.speechSynthesis.speak(utterance);
      } catch {
        setStatus(pcOnline ? "STANDBY" : "DISCONNECTED");
      }
    }

    function connectToServer(token) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
      }

      ws = new WebSocket(SERVER_URL);

      ws.onopen = () => {
        offlineBar.classList.remove("show");
        ws.send(JSON.stringify({ type: "auth", token, role: "phone" }));
      };

      ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }

        if (data.type === "auth_ok") {
          connectPanel.style.display = "none";
          msgsEl.style.display = "flex";
          quickWrap.style.display = "block";
          inputBar.style.display = "flex";
          localStorage.setItem(TOKEN_KEY, token);
          buildQuickCmds();
          setPCOnline(Boolean(data.pcOnline));
          addMessage(
            "jarvis",
            data.pcOnline
              ? "Connected. Your PC is online and ready."
              : "Connected. Waiting for your PC agent to come online.",
            "info"
          );
          return;
        }

        if (data.type === "pc_status") {
          setPCOnline(Boolean(data.online));
          addMessage("jarvis", data.online ? "Your PC is now online." : "PC agent disconnected.", "status");
          return;
        }

        if (data.type === "status") {
          if (data.status) setStatus(String(data.status));
          if (data.text) addMessage("jarvis", String(data.text), "status");
          return;
        }

        if (data.type === "response") {
          if (data.status) setStatus(String(data.status));
          if (data.text) {
            addMessage("jarvis", String(data.text), data.intent || "response");
            speakReply(String(data.text));
          }
          return;
        }

        if (data.type === "error") {
          const message = String(data.text || data.message || "Unknown error.");
          addMessage("jarvis", message, "error");
          if (!listening) setStatus(pcOnline ? "STANDBY" : "DISCONNECTED");
        }
      };

      ws.onclose = () => {
        offlineBar.classList.add("show");
        setPCOnline(false);
        setStatus("DISCONNECTED");
        setTimeout(() => {
          const saved = localStorage.getItem(TOKEN_KEY);
          if (saved) connectToServer(saved);
        }, 4000);
      };

      ws.onerror = () => {
        offlineBar.classList.add("show");
      };
    }

    function sendCommand(text) {
      const value = (text || "").trim();
      if (!value) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addMessage("jarvis", "You are offline. Connect to the relay first.", "error");
        return;
      }

      addMessage("user", value, "command");
      ws.send(JSON.stringify({ type: "command", text: value }));
      setStatus("THINKING");
      cmdInput.value = "";
    }

    function setupSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        micBtn.disabled = true;
        addMessage("jarvis", "Voice input is not supported in this browser.", "info");
        return;
      }

      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.lang = "en-ZA";

      recognition.onstart = () => {
        listening = true;
        micBtn.classList.add("recording");
        setStatus("LISTENING");
      };

      recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          transcript += event.results[i][0].transcript;
        }
        transcript = transcript.trim();
        if (transcript) {
          cmdInput.value = transcript;
        }

        const lastResult = event.results[event.results.length - 1];
        if (lastResult && lastResult.isFinal && transcript) {
          sendCommand(transcript);
        }
      };

      recognition.onerror = (event) => {
        const code = event.error || "unknown";
        const readable =
          code === "not-allowed"
            ? "Microphone permission was blocked. Enable mic access in browser settings."
            : code === "audio-capture"
              ? "No microphone was detected."
              : code === "no-speech"
                ? "I did not hear anything. Try again and speak clearly."
                : code === "network"
                  ? "Speech recognition network issue. Check your connection."
                  : "Voice input error. Tap mic and try again.";
        addMessage("jarvis", readable, "error");
      };

      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove("recording");
        setStatus(pcOnline ? "STANDBY" : "DISCONNECTED");
      };

      micBtn.onclick = async () => {
        if (!recognition) return;

        if (!ws || ws.readyState !== WebSocket.OPEN) {
          addMessage("jarvis", "Connect to the relay before using voice commands.", "error");
          return;
        }

        if (listening) {
          recognition.stop();
          return;
        }

        try {
          if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            await navigator.mediaDevices.getUserMedia({ audio: true });
          }
          recognition.start();
        } catch {
          addMessage("jarvis", "Microphone permission is required for voice input.", "error");
          setStatus(pcOnline ? "STANDBY" : "DISCONNECTED");
        }
      };
    }

    const canvas = document.getElementById("ring");
    const ctx = canvas.getContext("2d");
    const W = 180;
    const H = 180;
    const cx = 90;
    const cy = 90;
    let angle = 0;
    let pulse = 0;
    let waveform = new Array(20).fill(0);

    function drawRing() {
      angle += 1.8;
      pulse += 0.09;
      const col = STATUS_COLORS[jarvisStatus] || STATUS_COLORS.DISCONNECTED;
      const p = 4 * Math.sin(pulse);

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#060810";
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((angle * Math.PI) / 180);
      ctx.strokeStyle = "#0080FF44";
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.arc(0, 0, 78, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      ctx.setLineDash([]);

      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(cx, cy, 64 + p, 0, Math.PI * 2);
      ctx.stroke();

      ctx.strokeStyle = "#0080FF55";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, 52, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#010612";
      ctx.beginPath();
      ctx.arc(cx, cy, 42, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = col + "bb";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      for (let i = 0; i < 12; i += 1) {
        const a = ((i * 30 + angle) * Math.PI) / 180;
        const r = 66 + 3 * Math.sin(pulse + i * 0.5);
        ctx.strokeStyle = col + "77";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx + 56 * Math.cos(a), cy + 56 * Math.sin(a));
        ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        ctx.stroke();
      }

      const active = jarvisStatus === "LISTENING" || jarvisStatus === "SPEAKING";
      waveform = waveform.map((w) => (active ? (Math.random() - 0.5) * 18 : w * 0.85));
      const bW = 4;
      const gap = 2;
      const total = waveform.length * (bW + gap);
      const x0 = cx - total / 2;
      for (let i = 0; i < waveform.length; i += 1) {
        const h = Math.max(Math.abs(waveform[i]), 1);
        ctx.fillStyle = col + "88";
        ctx.fillRect(x0 + i * (bW + gap), cy - h, bW, h * 2);
      }

      requestAnimationFrame(drawRing);
    }
    drawRing();

    document.getElementById("connect-btn").onclick = () => {
      const token = tokenInput.value.trim();
      if (!token) return;
      connectToServer(token);
    };

    tokenInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") document.getElementById("connect-btn").click();
    });

    cmdInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") sendCommand(cmdInput.value);
    });

    document.getElementById("send-btn").onclick = () => sendCommand(cmdInput.value);
    voiceBtn.onclick = () => setVoiceEnabled(!voiceEnabled);

    setVoiceEnabled(voiceEnabled);
    selectPreferredVoice();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = selectPreferredVoice;
    }
    setupSpeechRecognition();

    const savedToken = localStorage.getItem(TOKEN_KEY);
    if (savedToken) {
      tokenInput.value = savedToken;
      connectToServer(savedToken);
    } else {
      setStatus("DISCONNECTED");
    }
  </script>
</body>
</html>
